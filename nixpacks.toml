# nixpacks.toml — Kairós MacroSignalTool
# Installa Chromium headless per Playwright (slide renderer Instagram)

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "xorg.libxshmfence",
]

[phases.install]
cmds = [
  "pip install -r files/requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/usr/bin playwright install chromium --with-deps || true",
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/usr/bin"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "0"
